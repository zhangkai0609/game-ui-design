*{box-sizing:border-box} body{margin:0;min-height:100vh;display:grid;place-items:center;background:#dbeeea;font-family:"STKaiti","KaiTi","Songti SC",serif;color:#514936}.phone{position:relative;width:min(390px,100vw);height:694px;overflow:hidden;border-radius:28px;background:linear-gradient(#cceef6 0 32%,#e8e1ce 32% 100%);box-shadow:0 24px 80px rgba(50,56,50,.28);padding:24px 18px}.phone:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 70% 20%,rgba(255,255,255,.55),transparent 24%),linear-gradient(120deg,rgba(255,255,255,.25),transparent);pointer-events:none}.topbar{position:relative;z-index:2;display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:168px}.tag{border:2px solid #91856a;border-radius:12px;background:rgba(251,246,229,.85);padding:7px 3px;text-align:center;font-size:13px;box-shadow:0 5px 0 rgba(94,84,58,.18)}.tag b{font-size:23px}.board{position:relative;z-index:2;margin:auto;width:330px;height:330px;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:6px;padding:8px;background:rgba(114,98,71,.18);border:3px solid #958666;border-radius:16px;box-shadow:0 12px 30px rgba(74,67,48,.25)}.tile{position:relative;border:2px solid #a59776;border-radius:10px;background:#e6dcc4;overflow:hidden;cursor:pointer;transition:.18s transform,.18s filter}.tile:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 30% 35%,rgba(255,255,255,.45),transparent 22%),radial-gradient(circle at 70% 70%,rgba(111,100,77,.18),transparent 28%),repeating-linear-gradient(35deg,rgba(255,255,255,.1) 0 6px,rgba(124,112,83,.07) 6px 12px)}.tile:hover{transform:translateY(-2px);filter:brightness(1.04)}.tile.revealed{filter:saturate(.85)}.legend{position:absolute;right:18px;bottom:20px;width:142px;background:rgba(249,242,221,.86);border:2px solid #9d9074;border-radius:18px;padding:12px;z-index:2;font-size:12px;box-shadow:0 12px 26px rgba(77,66,48,.18)}.legend h3{margin:0 0 8px;text-align:center;font-size:19px}.legend p{display:flex;align-items:center;gap:7px;margin:7px 0;line-height:1.2}.legend img{width:27px;height:27px;object-fit:contain}.result-pop{position:absolute;left:50%;top:50%;width:96px;height:96px;transform:translate(-50%,-50%) scale(.5);z-index:9;pointer-events:none;animation:popIn 780ms cubic-bezier(.2,1.2,.25,1) forwards}.result-pop img.icon{position:absolute;inset:10px;width:76px;height:76px;object-fit:contain;z-index:3}.result-pop .effect{position:absolute;inset:-34px;width:164px;height:164px;opacity:.86;z-index:1}.result-pop.note:after{content:"+20";position:absolute;right:-8px;top:-8px;padding:2px 8px;border-radius:999px;background:#f8efd4;border:2px solid #758a6c;font-weight:700;color:#50694d;z-index:4;animation:floatScore 850ms ease-out forwards}.result-pop.whale{animation:dangerPop 850ms ease-out forwards}.result-pop.luduan{animation:magicPop 1050ms ease-out forwards}@keyframes popIn{0%{opacity:0;transform:translate(-50%,-45%) scale(.35) rotate(-8deg)}45%{opacity:1;transform:translate(-50%,-54%) scale(1.18) rotate(3deg)}100%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0)}}@keyframes dangerPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.35)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.12) rotate(-5deg)}38%{transform:translate(-50%,-50%) scale(1.05) rotate(5deg)}58%{transform:translate(-50%,-50%) scale(1.02) rotate(-3deg)}100%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0)}}@keyframes magicPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.25)}45%{opacity:1;transform:translate(-50%,-56%) scale(1.2) rotate(-7deg);filter:brightness(1.25)}100%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0);filter:brightness(1)}}@keyframes floatScore{0%{opacity:0;transform:translateY(8px) scale(.8)}25%{opacity:1}100%{opacity:0;transform:translateY(-36px) scale(1.08)}}.caption{position:absolute;left:50%;top:calc(50% + 56px);transform:translateX(-50%);white-space:nowrap;background:rgba(255,248,225,.92);border:2px solid #97876b;border-radius:999px;padding:3px 10px;font-size:13px;z-index:4;color:#544936}.result-pop.safe .caption{color:#695f4e}.result-pop.whale .caption{color:#a9453f}.result-pop.luduan .caption{color:#765f27}