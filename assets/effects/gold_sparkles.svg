.board{width:660rpx;height:660rpx;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:12rpx;padding:16rpx;background:rgba(114,98,71,.18);border:6rpx solid #958666;border-radius:32rpx;box-shadow:0 24rpx 60rpx rgba(74,67,48,.25)}.tile{position:relative;border:4rpx solid #a59776;border-radius:20rpx;background:#e6dcc4;overflow:visible}.tile:before{content:"";position:absolute;inset:0;border-radius:18rpx;background:radial-gradient(circle at 30% 35%,rgba(255,255,255,.45),transparent 22%),radial-gradient(circle at 70% 70%,rgba(111,100,77,.18),transparent 28%),repeating-linear-gradient(35deg,rgba(255,255,255,.1) 0 12rpx,rgba(124,112,83,.07) 12rpx 24rpx)}.tile.revealed{filter:saturate(.85)}.result-pop{position:absolute;left:50%;top:50%;width:160rpx;height:160rpx;transform:translate(-50%,-50%) scale(.5);z-index:9;pointer-events:none;animation:popIn 780ms cubic-bezier(.2,1.2,.25,1) forwards}.result-pop .icon{position:absolute;left:18rpx;top:18rpx;width:124rpx;height:124rpx;z-index:3}.result-pop .effect{position:absolute;left:-50rpx;top:-50rpx;width:260rpx;height:260rpx;opacity:.86;z-index:1}.caption{position:absolute;left:50%;top:138rpx;transform:translateX(-50%);white-space:nowrap;background:rgba(255,248,225,.92);border:4rpx solid #97876b;border-radius:999rpx;padding:6rpx 18rpx;font-size:24rpx;z-index:4;color:#544936}.score{position:absolute;right:-12rpx;top:-12rpx;padding:4rpx 14rpx;border-radius:999rpx;background:#f8efd4;border:4rpx solid #758a6c;font-weight:700;color:#50694d;z-index:4;animation:floatScore 850ms ease-out forwards}.whale{animation:dangerPop 850ms ease-out forwards}.luduan{animation:magicPop 1050ms ease-out forwards}@keyframes popIn{0%{opacity:0;transform:translate(-50%,-45%) scale(.35) rotate(-8deg)}45%{opacity:1;transform:translate(-50%,-54%) scale(1.18) rotate(3deg)}100%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0)}}@keyframes dangerPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.35)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.12) rotate(-5deg)}38%{transform:translate(-50%,-50%) scale(1.05) rotate(5deg)}58%{transform:translate(-50%,-50%) scale(1.02) rotate(-3deg)}100%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0)}}@keyframes magicPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.25)}45%{opacity:1;transform:translate(-50%,-56%) scale(1.2) rotate(-7deg);filter:brightness(1.25)}100%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0);filter:brightness(1)}}@keyframes floatScore{0%{opacity:0;transform:translateY(12rpx) scale(.8)}25%{opacity:1}100%{opacity:0;transform:translateY(-72rpx) scale(1.08)}}